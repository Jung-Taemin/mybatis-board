<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>게시글 수정</h1>

    <form th:action="@{/boards/{id}/edit(id=${board.id})}" method="post">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" th:value="${board.title}">
        </div>

        <div class="form-group">
            <label for="writer">작성자</label>
            <input type="text" id="writer" name="writer" th:value="${board.writer}">
        </div>

        <div class="form-group">
            <label for="category">카테고리</label>
            <input type="text" id="category" name="category" th:value="${board.category}">
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" name="content" th:text="${board.content}"></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="button" th:onclick="|location.href='/boards/${board.id}'|">취소</button>
            <button type="submit">수정 완료</button>
        </div>
    </form>
</div>
</body>
</html>
