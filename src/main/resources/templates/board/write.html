<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>게시글 작성</h1>

    <form th:action="@{/boards/write}" th:object="${boardCreateDto}" method="post">
        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요">
            <p class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
        </div>

        <div class="form-group">
            <label for="writer">작성자</label>
            <input type="text" id="writer" th:field="*{writer}" placeholder="작성자를 입력하세요">
            <p class="error-message" th:if="${#fields.hasErrors('writer')}" th:errors="*{writer}"></p>
        </div>

        <div class="form-group">
            <label for="category">카테고리</label>
            <input type="text" id="category" th:field="*{category}" placeholder="카테고리를 입력하세요">
            <p class="error-message" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" th:field="*{content}" placeholder="내용을 입력하세요"></textarea>
            <p class="error-message" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
        </div>

        <button type="submit">등록</button>
    </form>
</div>
</body>
</html>
